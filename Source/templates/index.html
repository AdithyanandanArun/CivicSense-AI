<!DOCTYPE html>
<html>
<head>
    <title>Groq Chat</title>
    <!DOCTYPE html>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background: #0f172a;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .chat-container{
        background: #1e293b;
        width: 420px;
        height: 600px;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        overflow: hidden;
    }

    h2{
        margin: 0;
        padding: 16px;
        background: #3b82f6;
        color: white;
        text-align: center;
        font-weight: 600;
    }

    #chat-box{
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .user{
        align-self: flex-end;
        background: #2563eb;
        color: white;
        padding: 10px 14px;
        border-radius: 12px 12px 2px 12px;
        max-width: 70%;
    }

    .bot{
        align-self: flex-start;
        background: #334155;
        color: white;
        padding: 10px 14px;
        border-radius: 12px 12px 12px 2px;
        max-width: 70%;
    }

    .input-area{
        display: flex;
        padding: 12px;
        background: #0f172a;
        gap: 10px;
    }

    #user-input{
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    button{
        background: #3b82f6;
        border: none;
        padding: 10px 16px;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover{
        background: #2563eb;
    }
</style>

</head>
<body>
    <div class="chat-container">
        <h2>Groq Chat</h2>
        <div id="chat-box"></div>

        <input type="text" id="user-input" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value;

            if (!message) return;

            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div class="user">You: ${message}</div>`;

            input.value = "";

            const response = await fetch("/groq", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: message})
            });

            const data = await response.json();
            chatBox.innerHTML += `<div class="bot">Bot: ${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
